name: iOS-ipa-build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag"
        required: true
        default: v1.0.0

jobs:
  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: Coonch_ISO
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          architecture: x64

      - run: flutter pub get

      - name: Update pods
        run: pod install --repo-update
        working-directory: Coonch_ISO/ios

      - run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          cd build/ios/iphoneos
          mkdir Payload
          mv Runner.app Payload
          zip -qq -r -9 FlutterIpaExport.ipa Payload

      - name: Upload release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: Coonch_ISO/build/ios/iphoneos/FlutterIpaExport.ipa
          tag: ${{ github.event.inputs.tag }}
          overwrite: true
          body: "First release"
