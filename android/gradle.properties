org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
systemProp.https.protocols=TLSv1.2,TLSv1.1,TLSv1
systemProp.jdk.tls.client.protocols=TLSv1.2,TLSv1.1,TLSv1
# Disable Kotlin incremental caches to avoid "Could not close incremental caches" errors from plugin builds on Windows multi-drive setups.
kotlin.incremental=false
kotlin.incremental.android=false
kotlin.incremental.useClasspathSnapshot=false
android.javaCompile.suppressSourceTargetDeprecationWarning=true
