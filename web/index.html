<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Coonch web entry point.">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="coonch">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Coonch</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    function resolveBasePath() {
      const baseEl = document.querySelector('base');
      const raw = baseEl ? baseEl.getAttribute('href') : '/';
      const normalized = raw && raw !== '$FLUTTER_BASE_HREF' ? raw : '/';
      const noTrail = normalized.endsWith('/') ? normalized.slice(0, -1) : normalized;
      return noTrail || '';
    }

    function normalizePath(path) {
      const withLeading = path.startsWith('/') ? path : '/' + path;
      return withLeading.replace(/\/+$/, '') || '/';
    }

    function joinBaseAndRoute(basePath, routePath) {
      if (basePath === '/') return routePath;
      if (routePath === '/') return basePath + '/';
      return basePath + routePath;
    }

    function bootFlutter() {
      const script = document.createElement('script');
      script.src = 'flutter_bootstrap.js';
      script.async = true;
      document.body.appendChild(script);
    }

    (function routeEntry() {
      const base = resolveBasePath();
      const basePath = normalizePath(base || '/');
      const current = normalizePath(window.location.pathname);
      const rootPath = basePath;
      const indexPath = normalizePath(basePath + '/index.html');
      const params = new URLSearchParams(window.location.search);
      const forceApp = params.get('app') === '1';
      const requestedRoute = normalizePath(params.get('route') || '/');

      if (forceApp) {
        const finalPath = joinBaseAndRoute(basePath, requestedRoute);
        window.history.replaceState({}, '', finalPath);
        bootFlutter();
        return;
      }

      if (current === rootPath || current === indexPath) {
        const target = basePath === '/' ? '/landing.html' : basePath + '/landing.html';
        window.location.replace(target);
        return;
      }

      bootFlutter();
    })();
  </script>
</body>
</html>
